<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | Omaxe Eternity 2 Vrindavan</title>
    <meta name="robots" content="noindex, nofollow">
    <script>
        // SEO-Friendly URL Handler for GitHub Pages
        // Handles clean URL routing WITHOUT causing redirect loops
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;

            // Normalize path by removing trailing slashes (but not the root /)
            var cleanPath = path.length > 1 ? path.replace(/\/$/, '') : path;

            // Handle /index or /index.html -> redirect to root /
            if (cleanPath === '/index' || cleanPath === '/index.html' || cleanPath === '/Index' || cleanPath === '/Index.html') {
                window.location.replace('/' + search + hash);
                return;
            }

            // If the URL ends with .html, strip it to enforce clean paths
            // This handles /amenities.html -> /amenities, /contact.html -> /contact, etc.
            if (cleanPath.endsWith('.html')) {
                var newPath = cleanPath.slice(0, -5);
                // If it's a blog post, we need to map it differently
                // e.g. /blog/post-name.html -> the file exists so GitHub Pages should serve it
                // But if someone hits /amenities.html, GitHub Pages redirects to /amenities
                // and then 404 hits because the file IS called amenities.html
                // So strip .html and check known pages
                if (newPath === '') newPath = '/';
                window.location.replace(newPath + search + hash);
                return;
            }

            // Handle /blog with no trailing slash -> redirect to /blog/
            if (cleanPath === '/blog') {
                window.location.replace('/blog/' + search + hash);
                return;
            }

            // Known pages mapping - redirect clean URL to actual .html file
            var knownPages = {
                '/about': '/about.html',
                '/amenities': '/amenities.html',
                '/location': '/location.html',
                '/plot-sizes': '/plot-sizes.html',
                '/price-details': '/price-details.html',
                '/gallery': '/gallery.html',
                '/contact': '/contact.html',
                '/rera-legal': '/rera-legal.html',
                '/privacy-policy': '/privacy-policy.html',
                '/terms': '/terms.html',
                '/betogether-courtyard-vrindavan': '/betogether-courtyard-vrindavan.html',
                '/blog/omaxe-eternity-2-complete-guide': '/blog/omaxe-eternity-2-complete-guide.html',
                '/blog/why-invest-vrindavan-2026': '/blog/why-invest-vrindavan-2026.html',
                '/blog/vrindavan-real-estate-appreciation': '/blog/vrindavan-real-estate-appreciation.html',
                '/blog/living-in-vrindavan-spiritual-lifestyle': '/blog/living-in-vrindavan-spiritual-lifestyle.html',
                '/blog/omaxe-eternity-2-vs-competitors': '/blog/omaxe-eternity-2-vs-competitors.html',
                '/blog/omaxe-eternity-2-price-list-2026': '/blog/omaxe-eternity-2-price-list-2026.html',
                '/blog/omaxe-eternity-2-vrindavan-review': '/blog/omaxe-eternity-2-vrindavan-review.html',
                '/blog/omaxe-eternity-2-plot-booking-process': '/blog/omaxe-eternity-2-plot-booking-process.html',
                '/blog/omaxe-eternity-2-society-shops-vrindavan': '/blog/omaxe-eternity-2-society-shops-vrindavan.html',
                '/blog/plots-for-sale-in-vrindavan-2026': '/blog/plots-for-sale-in-vrindavan-2026.html',
                '/blog/vrindavan-property-rates-2026': '/blog/vrindavan-property-rates-2026.html',
                '/blog/omaxe-eternity-2-price-per-sq-yard-vrindavan': '/blog/omaxe-eternity-2-price-per-sq-yard-vrindavan.html',
                '/blog/plots-near-banke-bihari-temple-vrindavan': '/blog/plots-near-banke-bihari-temple-vrindavan.html',
                '/blog/omaxe-eternity-2-vrindavan-nri-investment-guide': '/blog/omaxe-eternity-2-vrindavan-nri-investment-guide.html'
            };

            if (knownPages[cleanPath]) {
                window.location.replace(knownPages[cleanPath] + search + hash);
                return;
            }

            // Unknown path — go to homepage
            window.location.replace('/');
        })();
    </script>
</head>
<body>
    <p>Redirecting to the correct page...</p>
</body>
</html>

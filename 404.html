<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | Omaxe Eternity 2 Vrindavan</title>
    <meta name="robots" content="noindex">
    <script>
        // SEO-Friendly URL Handler
        // Resolves GSC "Page with redirect" loops by dropping .html extensions
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;

            // Normalize path by removing trailing slashes
            var cleanPath = path.replace(/\/$/, '');

            // Handle /index or /index.html -> redirect to root
            if (cleanPath === '/index' || cleanPath === '/index.html') {
                window.location.replace('/' + search + hash);
                return;
            }

            // If the URL ends with .html, strip it to enforce clean paths
            if (cleanPath.endsWith('.html')) {
                var newPath = cleanPath.slice(0, -5); // remove '.html'
                window.location.replace(newPath + search + hash);
                return;
            }

            // For all other generic 404s, redirect to home page gracefully
            window.location.replace('/');
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
